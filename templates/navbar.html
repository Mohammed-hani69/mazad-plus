<meta name="csrf-token" content="{{ csrf_token() }}">
<script>
var currentUserIsSuperAdmin = {{ 'true' if current_user.is_super_admin else 'false' }};
var currentUserDarkMode = {{ 'true' if current_user.is_authenticated and current_user.user_settings and current_user.user_settings.dark_mode else 'false' }};
// Apply dark mode from user settings on page load
if (currentUserDarkMode) {
  document.documentElement.setAttribute('data-theme', 'dark');
  localStorage.setItem('theme', 'dark');
} else if (localStorage.getItem('theme') === 'dark') {
  document.documentElement.setAttribute('data-theme', 'dark');
}
// Auto-inject CSRF token into all forms
document.addEventListener('DOMContentLoaded', function() {
    var token = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
    if (token) {
        document.querySelectorAll('form').forEach(function(form) {
            if (!form.querySelector('input[name="csrf_token"]')) {
                var input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'csrf_token';
                input.value = token;
                form.appendChild(input);
            }
        });
    }
});
</script>
