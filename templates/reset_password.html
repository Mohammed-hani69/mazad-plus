<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعادة تعيين كلمة المرور - Mazad Plus</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #4f46e5; --primary-light: #6366f1; --primary-dark: #4338ca; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #f5f6fa 0%, #eef2ff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-container { width: 100%; max-width: 440px; }
    .auth-card { background: white; border-radius: 20px; padding: 40px 32px; box-shadow: 0 10px 40px rgba(79,70,229,0.1); border: 1px solid #e5e7eb; }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo img { height: 60px; margin-bottom: 12px; }
    .auth-logo h2 { font-size: 24px; font-weight: 800; color: #1f2937; margin: 0; }
    .auth-logo p { font-size: 14px; color: #6b7280; margin: 4px 0 0; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; color: #1f2937; margin-bottom: 6px; }
    .form-group .input-wrapper { position: relative; }
    .form-group .input-wrapper i { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 15px; pointer-events: none; }
    .form-group .form-control { padding: 12px 44px 12px 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 14px; font-family: 'Cairo', sans-serif; transition: all 0.3s; height: auto; width: 100%; }
    .form-group .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79,70,229,0.1); }
    .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; font-family: 'Cairo', sans-serif; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-submit:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,70,229,0.3); }
    .alert { border-radius: 10px; font-size: 14px; padding: 12px 16px; margin-bottom: 16px; }
    @media (max-width: 480px) { .auth-card { padding: 28px 20px; } }
    @media (max-width: 575px) { body { padding: 12px; } .auth-card { padding: 24px 16px; border-radius: 16px; } .btn-submit { padding: 12px; font-size: 15px; } }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="{{ url_for('static', filename='assets/images/logo.png') }}" alt="Mazad Plus">
        <h2>إعادة تعيين كلمة المرور</h2>
        <p>أدخل كلمة المرور الجديدة</p>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="POST" action="{{ url_for('reset_password', token=token) }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label for="password">كلمة المرور الجديدة</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" class="form-control" placeholder="أدخل كلمة المرور الجديدة" required minlength="6">
          </div>
        </div>
        <div class="form-group">
          <label for="confirm_password">تأكيد كلمة المرور</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="أعد إدخال كلمة المرور" required minlength="6">
          </div>
        </div>
        <button type="submit" class="btn-submit"><i class="fas fa-save"></i> حفظ كلمة المرور الجديدة</button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
